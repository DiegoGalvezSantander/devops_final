name: CI/CD Frontend EKS

on:
  push:
    branches: [ main ]
    paths:
      - 'front_despacho/**'

env:
  ECR_REPO_FRONTEND: front-despacho

jobs:
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
      
      - name: Build & push
        env:
          REG: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd front_despacho
          docker build -t $REG/${{ env.ECR_REPO_FRONTEND }}:${{ env.IMAGE_TAG }} .
          docker push $REG/${{ env.ECR_REPO_FRONTEND }}:${{ env.IMAGE_TAG }}

      - name: Actualizar manifests con tag
        run: sed -i "s|\${IMAGE_TAG}|${{ env.IMAGE_TAG }}|g" k8s/frontend-deployment.yaml

      - name: Configurar kubeconfig
        run: aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ECK_PRUEBA3

      - name: Aplicar y actualizar despliegue
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/frontend -n innovatech-production frontend=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_FRONTEND }}:${{ env.IMAGE_TAG }}