name: CI/CD Frontend EKS

on:
  push:
    branches: [ main ]
    paths:
      - 'front_despacho/**'

env:
  REGISTRY: 193318341091.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
      - uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build & push
        run: |
          TAG=${GITHUB_SHA::7}
          cd front_despacho
          docker build -t $REGISTRY/front-despacho:$TAG .
          docker push $REGISTRY/front-despacho:$TAG
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Actualizar manifests
        run: sed -i "s|\${IMAGE_TAG}|${{ env.IMAGE_TAG }}|g" k8s/frontend-deployment.yaml

      - name: Configurar kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name ECK_PRUEBA3

      - name: Aplicar despliegue
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/frontend -n innovatech-production frontend=$REGISTRY/front-despacho:${{ env.IMAGE_TAG }}