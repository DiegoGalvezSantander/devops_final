name: CI/CD Frontend EKS

on:
  push:
    branches: [ main ]
    paths:
      - 'front_despacho/**'
      - 'k8s/frontend-*.yaml'

env:
  ECR_REPO_FRONTEND: front-despacho

jobs:
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & push Frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd front_despacho
          docker build -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} .
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG}

      - name: Configurar kubeconfig
        run: aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Aplicar manifests y actualizar imágenes
        env:
          NS: innovatech-production
          REG: ${{ steps.login-ecr.outputs.registry }}
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/
          kubectl set image deployment/frontend -n $NS frontend=$REG/${{ env.ECR_REPO_FRONTEND }}:${IMAGE_TAG}