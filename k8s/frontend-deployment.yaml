apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: innovatech-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 193318341091.dkr.ecr.us-east-1.amazonaws.com/pruebafrontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"